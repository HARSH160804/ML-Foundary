name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: mlfoundry-backend
  CONTAINER_NAME: mlfoundry-backend

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            
            # Pull latest image
            docker pull ${{ steps.build-image.outputs.image }}
            
            # Stop and remove old container
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            
            # Start new container
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /opt/mlfoundry/.env \
              -v /opt/mlfoundry/storage:/app/storage \
              ${{ steps.build-image.outputs.image }}
            
            # Wait for container to be healthy
            sleep 10
            
            # Check if container is running
            docker ps | grep ${{ env.CONTAINER_NAME }}

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 2m
          script: |
            # Check container status
            echo "Container Status:"
            docker ps | grep ${{ env.CONTAINER_NAME }}
            
            # Wait for app to be fully ready (45 seconds for workers to start)
            echo ""
            echo "Waiting for application to start (45 seconds)..."
            sleep 45
            
            # Check container logs
            echo ""
            echo "Recent Logs:"
            docker logs --tail 50 ${{ env.CONTAINER_NAME }}
            
            # Test health endpoint with retries
            echo ""
            echo "Health Check with retries:"
            for i in 1 2 3 4 5; do
              echo "Attempt $i/5..."
              if curl -f -s http://localhost:8000/health; then
                echo ""
                echo "✅ Health check passed!"
                exit 0
              fi
              if [ $i -lt 5 ]; then
                echo "Waiting 5 seconds before retry..."
                sleep 5
              fi
            done
            echo ""
            echo "❌ Health check failed after 5 retries"
            exit 1

      - name: Deployment Summary
        run: |
          echo "✅ Deployment successful!"
          echo "📦 Image: ${{ steps.build-image.outputs.image }}"
          echo "🌐 Backend URL: http://${{ secrets.EC2_HOST }}"
          echo "🏥 Health Check: http://${{ secrets.EC2_HOST }}/health"
